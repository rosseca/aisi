version: "1.0.0"
rules:
  - name: sample-rule
    path: rules/sample.mdc
    description: "A sample rule for testing"
    alwaysApply: false

skills:
  - name: sample-skill
    path: skills/sample-skill
    description: "A sample skill for testing"

  - name: manifest
    path: skills/manifest
    description: "Guide for creating and maintaining AISI manifest.yaml files with dependency management"

  - name: skill-with-deps
    path: skills/skill-with-deps
    description: "Skill requiring npx command"
    command: npx
    install:
      macos:
        brew:
          command: node
      linux:
        apt:
          command: npm
          post_install: "npm install -g npx"

  - name: skill-with-npm
    path: skills/skill-with-npm
    description: "Skill using npm package (multiplatform)"
    command: ng
    install:
      npm:
        packages:
          - package: "@angular/cli"
            version: "^17.0.0"

  - name: skill-with-postinstall
    path: skills/skill-with-postinstall
    description: "Skill with generic post-install command"
    command: eslint
    install:
      npm:
        packages:
          - package: eslint
      post_install: "eslint --init"

  - name: skill-with-multiple-npm
    path: skills/skill-with-multiple-npm
    description: "Skill requiring multiple npm packages"
    command: tsc
    install:
      npm:
        packages:
          - package: typescript
            version: "^5.0.0"
          - package: ts-node
          - package: "@types/node"

agents:
  - name: sample-agent
    path: agents/sample-agent.md
    description: "A sample subagent for testing"
    model: fast

hooks:
  - name: sample-hook
    configPath: hooks/hooks.json
    scriptsPath: hooks/scripts
    description: "A sample hook for testing"

mcp:
  - name: sample-mcp
    path: mcp/sample.json
    description: "A sample MCP config for testing"
    env:
      SAMPLE_API_KEY:
        description: "Sample API key"
        required: true
        secret: true

  - name: mcp-with-skill
    path: mcp/sample.json
    description: "MCP with associated local skill"
    skill:
      name: sample-skill
    env:
      API_KEY:
        description: "API key"
        required: true

  - name: mcp-with-deps
    path: mcp/sample.json
    description: "MCP requiring npx command with auto-install"
    command: npx
    install:
      npm:
        package: "npm"
        version: "latest"

  - name: mcp-with-postinstall
    path: mcp/sample.json
    description: "MCP with post-install command"
    command: npx
    install:
      npm:
        package: "npm"
    postInstall:
      command: echo
      args: ["Post-install executed!"]
      description: "Sample post-install command"

  - name: mcp-with-external-skill
    path: mcp/sample.json
    description: "MCP with external skill from another repo"
    skill:
      repo: github.com/example/external-skills
      path: mcp-helper-skill
      ref: main
    command: npx
    install:
      npm:
        package: "npm"

agentsMd:
  - name: sample-agents-md
    path: agents-md/sample.md
    description: "A sample AGENTS.md template for testing"

external:
  - name: external-skill
    type: skill
    repo: github.com/example/external-skills
    path: my-skill
    ref: main
    description: "An external skill reference for testing"
